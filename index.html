<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inchaban Eng</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  html, body { height: 100%; margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  #map { height: 100%; width: 100%; }

  #topbar {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: #fff; padding: 8px 16px; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); font-size: 14px; font-weight: 600;
    color: #1a1a1a; max-width: 82vw; text-align: center; cursor: pointer;
    display: flex; align-items: center; gap: 8px; user-select: none;
  }
  #topbar .txt { display: flex; flex-direction: column; }
  #topbar span.sub { font-size: 11px; font-weight: 400; color: #666; margin-top: 2px; }
  #topbar .chev { font-size: 10px; color: #999; transition: transform 0.2s; }
  #topbar.open .chev { transform: rotate(180deg); }

  #areaPanel {
    position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
    z-index: 999; background: #fff; border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3); width: min(320px, 86vw);
    max-height: 0; overflow: hidden; transition: max-height 0.2s ease;
  }
  #areaPanel.open { max-height: 320px; }
  #areaPanel .inner { padding: 10px; }
  #areaSearch {
    width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px;
  }
  #areaList { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .area-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 8px; cursor: pointer; font-size: 13px; text-align: left;
    border: none; background: #f5f5f5; width: 100%;
  }
  .area-item:active { background: #e8e8e8; }
  .area-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .area-item .name { color: #444; font-weight: 400; }
  .area-item b { color: #1a1a1a; }

  #controls {
    position: absolute; bottom: 24px; right: 12px; z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ctrl-btn {
    width: 48px; height: 48px; border-radius: 50%; border: none;
    background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    font-size: 20px; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .ctrl-btn:active { background: #eee; }
  .ctrl-btn.active { background: #1a73e8; color: #fff; }

  #navigateBtn {
    position: absolute; bottom: 24px; left: 12px; z-index: 1000;
    background: #1a73e8; color: #fff; border: none; border-radius: 24px;
    padding: 12px 20px; font-size: 15px; font-weight: 600;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer;
    display: none; align-items: center; gap: 6px;
  }

  .area-label {
    background: transparent; border: none; box-shadow: none;
    font-weight: 700; font-size: 11px; color: #fff;
    text-shadow: 0 0 3px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.9);
  }
  .area-label::before { display: none; }
</style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div class="txt">
    <span id="areaName">Loading…</span>
    <span id="areaSub" class="sub"></span>
  </div>
  <span class="chev">▾</span>
</div>

<div id="areaPanel">
  <div class="inner">
    <input id="areaSearch" type="text" placeholder="Search areas…" />
    <div id="areaList"></div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="locateBtn" title="My Location">📍</button>
  <button class="ctrl-btn" id="satelliteBtn" title="Toggle Basemap">🗺</button>
  <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
</div>

<button id="navigateBtn">📌 Navigate</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>

const ntwaabanData = {

      ]] }
    },
    {
      "type": "Feature",
      "properties": { "id": "G4B", "name": "Behind Washing Bay", "block": "Block B", "description": "Behind washing bay" },
      "geometry": { "type": "Polygon", "coordinates": [[
        [ -1.675738332171254, 5.007007764421287, 0.0 ], [ -1.675952267529243, 5.006551474371892, 0.0 ], [ -1.675915759085694, 5.006142184333534, 0.0 ], [ -1.675299320944592, 5.005522659067815, 0.0 ], [ -1.674634522252726, 5.00472448920222, 0.0 ], [ -1.674225348490503, 5.004274295258497, 0.0 ], [ -1.673745865425791, 5.004734374447901, 0.0 ], [ -1.675738332171254, 5.007007764421287, 0.0 ]
      ]] }
    },
    {
      "type": "Feature",
      "properties": { "id": "G4C", "name": "Inside estate", "block": "Block C", "description": "Estate after hill" },
      "geometry": { "type": "Polygon", "coordinates": [[
        [ -1.67694007491566, 5.007839398137614, 0.0 ], [ -1.677002109508413, 5.007397850021004, 0.0 ], [ -1.676753393559947, 5.007189885844542, 0.0 ], [ -1.676360168132127, 5.007080159752377, 0.0 ], [ -1.676264787325284, 5.007649868769075, 0.0 ], [ -1.676157514498513, 5.007920792117355, 0.0 ], [ -1.67595691237544, 5.008519102941964, 0.0 ], [ -1.676704499680601, 5.008751584628344, 0.0 ], [ -1.67694007491566, 5.007839398137614, 0.0 ]
      ]] }
    },
    {
      "type": "Feature",
      "properties": { "id": "G4D", "name": "Ituma Estates", "block": "Block D", "description": "Hill after Estates" },
      "geometry": { "type": "Polygon", "coordinates": [[
        [ -1.675471990702644, 5.006802594411085, 0.0 ], [ -1.674761374705028, 5.007111611234449, 0.0 ], [ -1.674774307733287, 5.007405265867723, 0.0 ], [ -1.674588944534506, 5.007764701888458, 0.0 ], [ -1.674262331993034, 5.008078583983313, 0.0 ], [ -1.674121028103435, 5.008129382019963, 0.0 ], [ -1.673887308896117, 5.008588505473033, 0.0 ], [ -1.6742861546139, 5.008868534918423, 0.0 ], [ -1.674499221012444, 5.008631698275553, 0.0 ], [ -1.674579139481167, 5.008378535557513, 0.0 ], [ -1.674598586058645, 5.008176934520816, 0.0 ], [ -1.674756334184597, 5.007990315124465, 0.0 ], [ -1.675273451833879, 5.007736576132871, 0.0 ], [ -1.675848325560501, 5.007541227392806, 0.0 ], [ -1.675729233104074, 5.007096593216144, 0.0 ], [ -1.675661780918857, 5.006792770753805, 0.0 ], [ -1.675471990702644, 5.006802594411085, 0.0 ]
      ]] }
    },
    {
      "type": "Feature",
      "properties": { "id": "G4E", "name": "Ituma Estates", "block": "Block D", "description": "Hill after Estates" },
      "geometry": { "type": "Polygon", "coordinates": [[
        [ -1.676449940624237, 5.009907373943977, 0.0 ], [ -1.676861825069977, 5.008933982306213, 0.0 ], [ -1.675947508228239, 5.008540649128843, 0.0 ], [ -1.675971772609014, 5.00824071807042, 0.0 ], [ -1.675261561379118, 5.008143570386919, 0.0 ], [ -1.674838495668014, 5.008300668230341, 0.0 ], [ -1.674691693879968, 5.009439222504015, 0.0 ], [ -1.676449940624237, 5.009907373943977, 0.0 ]
      ]] }
    },
    {
      "type": "Feature",
      "properties": { "id": "KH", "name": "KINGDOM HALL", "block": "Block KH", "description": "Kingdom Hall" },
      "geometry": { "type": "Polygon", "coordinates": [[
        [ -1.677304621349041, 5.001257232164877, 0.0 ], [ -1.677421339456939, 5.001130277851473, 0.0 ], [ -1.677181591857776, 5.000885677097554, 0.0 ], [ -1.677040606186718, 5.001007391928852, 0.0 ], [ -1.677292473990811, 5.001257440395282, 0.0 ], [ -1.677304621349041, 5.001257232164877, 0.0 ]
      ]] }
    }
  ]
};

const map = L.map('map', { zoomControl: false }).setView([6.001, -1.747], 15);

const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 22, maxNativeZoom: 19, attribution: '© OpenStreetMap contributors'
});

const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 22, maxNativeZoom: 18, attribution: 'Esri World Imagery'
});

// Default basemap is now satellite.
let satelliteOn = true;
satLayer.addTo(map);
document.getElementById('satelliteBtn').textContent = '🗺'; // shows the OTHER option you can switch to

// --- Colour by block ---
const blockColors = {
  'Block A': '#1a73e8',
  'Block B': '#34a853',
  'Block C': '#fbbc04',
  'Block D': '#a142f4',
  'Block KH': '#ea4335'
};
function styleForBlock(block) {
  const c = blockColors[block] || '#1a73e8';
  return { color: c, weight: 2, fillColor: c, fillOpacity: 0.18 };
}
const highlightStyle = { color: '#ff3d00', weight: 3, fillColor: '#ff3d00', fillOpacity: 0.35 };

const geoLayer = L.geoJSON(ntwaabanData, {
  style: f => styleForBlock(f.properties.block)
}).addTo(map);

// --- Zoom-dependent permanent labels ---
geoLayer.eachLayer(l => {
  l.bindTooltip(l.feature.properties.id, {
    permanent: true, direction: 'center', className: 'area-label'
  });
});
function updateLabelVisibility() {
  const show = map.getZoom() >= 17;
  geoLayer.eachLayer(l => { show ? l.openTooltip() : l.closeTooltip(); });
}
map.on('zoomend', updateLabelVisibility);
updateLabelVisibility();

let selectedLayer = null;
let userMarker = null;
let userLatLng = null;
let nearestMarker = null;
let watchId = null;
let lastDistanceMeters = null;

// --- Area switcher panel ---
const topbar = document.getElementById('topbar');
const areaPanel = document.getElementById('areaPanel');
const areaList = document.getElementById('areaList');
const areaSearch = document.getElementById('areaSearch');

function renderAreaList(filter) {
  areaList.innerHTML = '';
  const q = (filter || '').toLowerCase();
  ntwaabanData.features
    .filter(f => !q || f.properties.id.toLowerCase().includes(q) || f.properties.name.toLowerCase().includes(q))
    .forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'area-item';
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = (blockColors[f.properties.block] || '#1a73e8');
      const label = document.createElement('span');
      label.className = 'name';
      label.innerHTML = '<b>' + f.properties.id + '</b> — ' + f.properties.name;
      btn.appendChild(dot);
      btn.appendChild(label);
      btn.addEventListener('click', () => {
        selectArea(f.properties.id, true);
        closePanel();
      });
      areaList.appendChild(btn);
    });
}
renderAreaList('');
areaSearch.addEventListener('input', () => renderAreaList(areaSearch.value));

function openPanel() {
  areaPanel.classList.add('open');
  topbar.classList.add('open');
  areaSearch.value = '';
  renderAreaList('');
  setTimeout(() => areaSearch.focus(), 150);
}
function closePanel() {
  areaPanel.classList.remove('open');
  topbar.classList.remove('open');
}
topbar.addEventListener('click', () => {
  areaPanel.classList.contains('open') ? closePanel() : openPanel();
});

function findFeatureLayer(id) {
  let found = null;
  geoLayer.eachLayer(l => { if (l.feature.properties.id === id) found = l; });
  return found;
}

function haversineMeters(a, b) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b[0] - a[0]);
  const dLng = toRad(b[1] - a[1]);
  const s = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(a[0])) * Math.cos(toRad(b[0])) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
function formatDistance(m) {
  return m < 1000 ? Math.round(m) + 'm' : (m / 1000).toFixed(2) + 'km';
}

function updateSubtitle() {
  if (!selectedLayer) return;
  const p = selectedLayer.feature.properties;
  const parts = [p.block, p.description].filter(Boolean);
  if (lastDistanceMeters !== null) parts.push(formatDistance(lastDistanceMeters) + ' to boundary');
  document.getElementById('areaSub').textContent = parts.join(' · ');
}

function selectArea(id, updateUrl) {
  if (selectedLayer) selectedLayer.setStyle(styleForBlock(selectedLayer.feature.properties.block));

  const layer = findFeatureLayer(id);
  const nameEl = document.getElementById('areaName');
  const subEl = document.getElementById('areaSub');
  const navBtn = document.getElementById('navigateBtn');

  if (!layer) {
    nameEl.textContent = 'Area not found: ' + id;
    subEl.textContent = '';
    navBtn.style.display = 'none';
    return;
  }

  layer.setStyle(highlightStyle);
  selectedLayer = layer;
  lastDistanceMeters = null;
  map.fitBounds(layer.getBounds(), { padding: [60, 60], maxZoom: 18 });

  const p = layer.feature.properties;
  nameEl.textContent = p.name || p.id;

  if (userLatLng) {
    const nearest = nearestPointOnPolygon(userLatLng, layer);
    if (nearest) {
      lastDistanceMeters = haversineMeters(userLatLng, nearest);
      if (nearestMarker) map.removeLayer(nearestMarker);
      nearestMarker = L.circleMarker(nearest, {
        radius: 7, color: '#fff', weight: 2, fillColor: '#fbbc04', fillOpacity: 1
      }).addTo(map);
    }
  }
  updateSubtitle();

  navBtn.style.display = 'flex';
  navBtn.onclick = () => navigateTo(layer);

  if (updateUrl) {
    const url = new URL(window.location);
    url.searchParams.set('id', id);
    window.history.replaceState({}, '', url);
  }
}

function closestPointOnSegment(p, a, b) {
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return { pt: a, dist: Math.hypot(p[0] - a[0], p[1] - a[1]) };
  let t = ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const pt = [a[0] + t * dx, a[1] + t * dy];
  return { pt, dist: Math.hypot(p[0] - pt[0], p[1] - pt[1]) };
}

function nearestPointOnPolygon(userLatLng, layer) {
  const geom = layer.feature.geometry;
  const rings = geom.type === 'Polygon' ? geom.coordinates : geom.coordinates.flat();
  const p = [userLatLng[1], userLatLng[0]];

  let best = null;
  rings.forEach(ring => {
    for (let i = 0; i < ring.length - 1; i++) {
      const res = closestPointOnSegment(p, ring[i], ring[i + 1]);
      if (!best || res.dist < best.dist) best = res;
    }
  });
  return best ? [best.pt[1], best.pt[0]] : null;
}

function navigateTo(layer) {
  let destination = layer.getBounds().getCenter();

  if (userLatLng) {
    const nearest = nearestPointOnPolygon(userLatLng, layer);
    if (nearest) destination = { lat: nearest[0], lng: nearest[1] };
  }

  const url = 'https://www.google.com/maps/dir/?api=1&destination=' + destination.lat + ',' + destination.lng;
  window.open(url, '_blank');
}

// --- Live GPS tracking (toggle on/off) ---
function onPosition(pos) {
  const first = (userLatLng === null);
  userLatLng = [pos.coords.latitude, pos.coords.longitude];

  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker(userLatLng, {
    radius: 8, color: '#fff', weight: 2, fillColor: '#4285f4', fillOpacity: 1
  }).addTo(map);

  if (selectedLayer) {
    const nearest = nearestPointOnPolygon(userLatLng, selectedLayer);
    if (nearest) {
      lastDistanceMeters = haversineMeters(userLatLng, nearest);
      if (nearestMarker) map.removeLayer(nearestMarker);
      nearestMarker = L.circleMarker(nearest, {
        radius: 7, color: '#fff', weight: 2, fillColor: '#fbbc04', fillOpacity: 1
      }).addTo(map);
      updateSubtitle();
    }
  } else if (first) {
    map.setView(userLatLng, 17);
  }
}

document.getElementById('locateBtn').addEventListener('click', () => {
  const btn = document.getElementById('locateBtn');
  if (!navigator.geolocation) {
    alert('Geolocation not supported on this device/browser.');
    return;
  }
  if (watchId === null) {
    watchId = navigator.geolocation.watchPosition(onPosition, err => {
      alert('Could not get location: ' + err.message);
    }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 });
    btn.classList.add('active');
  } else {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    btn.classList.remove('active');
  }
});

// --- Basemap toggle ---
document.getElementById('satelliteBtn').addEventListener('click', () => {
  satelliteOn = !satelliteOn;
  if (satelliteOn) {
    map.removeLayer(streetLayer);
    satLayer.addTo(map);
    document.getElementById('satelliteBtn').textContent = '🗺';
  } else {
    map.removeLayer(satLayer);
    streetLayer.addTo(map);
    document.getElementById('satelliteBtn').textContent = '🛰';
  }
});

document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});

const params = new URLSearchParams(window.location.search);
const requestedId = params.get('id');

if (requestedId) {
  selectArea(requestedId, false);
} else {
  document.getElementById('areaName').textContent = 'Territory';
  document.getElementById('areaSub').textContent = 'Tap to choose you territory';
  map.fitBounds(geoLayer.getBounds(), { padding: [40, 40] });
}

</script>
</body>
</html>
