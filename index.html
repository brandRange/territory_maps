<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Territory Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div class="txt">
    <span id="areaName">Loading…</span>
    <span id="areaSub" class="sub"></span>
  </div>
  <span class="chev">▾</span>
</div>

<div id="areaPanel">
  <div class="inner">
    <input id="areaSearch" type="text" placeholder="Search Territory" />
    <div id="areaList"></div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="locateBtn" title="My Location">📍</button>
  <button class="ctrl-btn" id="satelliteBtn" title="Toggle Basemap">🗺</button>
  <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
</div>

<button id="navigateBtn">📌 Navigate</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
